<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>KapásPont · Horgász Napló</title>
<style>
  html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#f5efe3;color:#2a1f15;font-family:system-ui,-apple-system,Segoe UI,sans-serif}
  #app-frame{position:fixed;inset:0;width:100%;height:100%;border:0;background:#f5efe3;display:block}
  #boot{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#f5efe3;z-index:10}
  .box{max-width:620px;background:#faf5e9;border:1px solid rgba(120,90,50,.18);border-radius:24px;padding:26px;box-shadow:0 18px 48px rgba(74,48,24,.12)}
  .t{font-weight:800;font-size:19px;margin-bottom:8px}.s{color:#7a6750;line-height:1.5;font-size:14px}.e{margin-top:10px;color:#a85a2b;font-size:13px;white-space:pre-wrap}
</style>
</head>
<body>
<div id="boot"><div class="box"><div class="t">KapásPont indítása…</div><div class="s">V1 · Lombhullás felület és stabilitási hotfix betöltése.</div><div class="e" id="boot-msg"></div></div></div>
<iframe id="app-frame" title="KapásPont"></iframe>
<script>
(function(){
  const boot=document.getElementById('boot');
  const msg=document.getElementById('boot-msg');
  const frame=document.getElementById('app-frame');
  function showError(err){
    const text=String(err&&err.stack||err&&err.message||err||'Ismeretlen hiba');
    if(msg)msg.textContent=text;
    console.error('[KapásPont boot]',err);
  }
  function patchAppHtml(html){
    const css='<link id="v1-lombhullas-css" rel="stylesheet" href="assets/v1-lombhullas.css?v=20260517">';
    if(!html.includes('v1-lombhullas-css')) html=html.replace('</head>',css+'\n</head>');

    html=html.replace('let lat=null,lon=null,weatherCache=null,placeCache=null,forecast24Cache=[];','var lat=null,lon=null,weatherCache=null,placeCache=null,forecast24Cache=[];');
    html=html.replace('let lat = null, lon = null, weatherCache = null, placeCache = null, forecast24Cache = [];','var lat = null, lon = null, weatherCache = null, placeCache = null, forecast24Cache = [];');

    const earlyRules="\n// V1 Lombhullas startup hotfix: early fish rule state\nvar HU_PROTECTED_OR_NOT_KEEPABLE_IDS = new Set(['aranykarasz','kecsege','vagotok','soregtok','magyarbuco','nemetbuco','reticsik','vagocsik','lapipoc','szivarvanyosokle','kurtabaing','homoki_kullo','selymes_durbincs','szeles_durbincs']);\nvar HU_POND_OR_DECORATIVE_IDS = new Set(['koi','lenaiktok']);\n";
    if(!html.includes('V1 Lombhullas startup hotfix')) html=html.replace('function buildFishNarrative(f,x){',earlyRules+'\nfunction buildFishNarrative(f,x){');
    html=html.replace('const HU_PROTECTED_OR_NOT_KEEPABLE_IDS=new Set([','HU_PROTECTED_OR_NOT_KEEPABLE_IDS=new Set([');
    html=html.replace('const HU_POND_OR_DECORATIVE_IDS=new Set([','HU_POND_OR_DECORATIVE_IDS=new Set([');

    const oldGps="function getLocation(){\n  const dot=document.getElementById('gps-dot');\n  const txt=document.getElementById('gps-text');\n  dot.className='gps-dot loading';\n  txt.textContent='Helymeghatározás folyamatban…';";
    const newGps="function getLocation(){\n  const dot=document.getElementById('gps-dot');\n  const txt=document.getElementById('gps-text');\n  if(!dot||!txt){console.warn('[GPS] gps-dot/gps-text elem nem található.');return;}\n  dot.className='gps-dot loading';\n  txt.textContent='Helymeghatározás folyamatban…';";
    html=html.replace(oldGps,newGps);
    html=html.replace(/v26\.19\.1\.5 Halfaj betöltés hotfix/g,'v26.19.1.6 V1 Lombhullás startup hotfix');
    return html;
  }
  async function start(){
    try{
      const res=await fetch('assets/app.html?v=v1-lombhullas-hotfix-'+Date.now(),{cache:'no-store'});
      if(!res.ok)throw new Error('assets/app.html HTTP '+res.status);
      const patched=patchAppHtml(await res.text());
      frame.srcdoc=patched;
      frame.addEventListener('load',()=>{
        boot.style.display='none';
        console.info('[KapásPont] V1 Lombhullás + startup hotfix betöltve.');
      },{once:true});
    }catch(err){showError(err);}
  }
  start();
})();
</script>
</body>
</html>
