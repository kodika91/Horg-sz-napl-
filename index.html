<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>KapásPont · Horgász Napló</title>
<style>
  html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#f5efe3;color:#2a1f15;font-family:system-ui,-apple-system,Segoe UI,sans-serif}
  #app-frame{position:fixed;inset:0;width:100%;height:100%;border:0;background:#f5efe3;display:block}
  #boot{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#f5efe3;z-index:10}
  .box{max-width:560px;background:#faf5e9;border:1px solid rgba(120,90,50,.18);border-radius:24px;padding:26px;box-shadow:0 18px 48px rgba(74,48,24,.12)}
  .t{font-weight:800;font-size:19px;margin-bottom:8px}.s{color:#7a6750;line-height:1.5;font-size:14px}.e{margin-top:10px;color:#a85a2b;font-size:13px;white-space:pre-wrap}
</style>
</head>
<body>
<div id="boot"><div class="box"><div class="t">KapásPont indítása…</div><div class="s">V1 · Lombhullás felület betöltése.</div><div class="e" id="boot-msg"></div></div></div>
<iframe id="app-frame" src="assets/app.html?v=v1-lombhullas-frame"></iframe>
<script>
(function(){
  const frame=document.getElementById('app-frame');
  const boot=document.getElementById('boot');
  const msg=document.getElementById('boot-msg');
  function injectDesign(){
    try{
      const doc=frame.contentDocument||frame.contentWindow.document;
      if(!doc)throw new Error('Az app dokumentum még nem elérhető.');
      if(!doc.getElementById('v1-lombhullas-css')){
        const link=doc.createElement('link');
        link.id='v1-lombhullas-css';
        link.rel='stylesheet';
        link.href='v1-lombhullas.css?v=20260517';
        doc.head.appendChild(link);
      }
      try{frame.contentWindow.__KAPASPONT_V1_LOMBHULLAS__=true;}catch(e){}
      boot.style.display='none';
      console.info('[KapásPont] V1 Lombhullás design layer betöltve.');
    }catch(err){
      console.warn('[KapásPont] V1 design injektálási hiba:',err);
      if(msg)msg.textContent='A program betöltött, de a V1 stílusréteg nem kapcsolódott automatikusan: '+(err&&err.message?err.message:err);
      setTimeout(()=>{boot.style.display='none';},2200);
    }
  }
  frame.addEventListener('load',()=>setTimeout(injectDesign,60));
  setTimeout(()=>{if(boot&&boot.style.display!=='none')injectDesign();},3000);
})();
</script>
</body>
</html>
