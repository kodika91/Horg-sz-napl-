<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KapásPont</title>
<style>body{margin:0;font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:#f4f0e8;color:#2a2018;min-height:100vh;display:flex;align-items:center;justify-content:center}.box{max-width:560px;background:#faf8f4;border:1px solid rgba(120,100,70,.18);border-radius:18px;padding:24px;box-shadow:0 10px 35px rgba(60,40,10,.12)}.t{font-weight:800;font-size:18px;margin-bottom:8px}.s{color:#6b5840;line-height:1.5;font-size:14px}</style>
</head>
<body>
<div class="box"><div class="t">KapásPont betöltése…</div><div class="s">v34 · Weather card hotfix…</div></div>
<script>
(async function(){
  try{
    const res=await fetch('https://raw.githubusercontent.com/kodika91/Horg-sz-napl-/22233b8c04acdd3ad868a9b78ed71514c0d58365/assets/app.html',{cache:'no-store'});
    if(!res.ok) throw new Error('app.html fetch failed: '+res.status);
    let html=await res.text();

    html=html.replace('v26.19.1.5 Halfaj betöltés hotfix','v34 weather card rounding hotfix');
    html=html.replace('\napplyHuV2();\n\n\n// CSALI ADATBÁZIS','\n// applyHuV2 moved after helper constants.\n\n\n// CSALI ADATBÁZIS');
    html=html.replace('const PAGE_TITLES=','var PAGE_TITLES=');
    html=html.replace('let lat=null,lon=null,weatherCache=null,placeCache=null,forecast24Cache=[];','var lat=null,lon=null,weatherCache=null,placeCache=null,forecast24Cache=[];');
    html=html.replace("let fishFilter='all',fishSearch='';","var fishFilter='all',fishSearch='';");
    html=html.replace('const HU_PROTECTED_OR_NOT_KEEPABLE_IDS=new Set(','var HU_PROTECTED_OR_NOT_KEEPABLE_IDS=new Set(');
    html=html.replace('const HU_POND_OR_DECORATIVE_IDS=new Set','var HU_POND_OR_DECORATIVE_IDS=new Set');
    html=html.replace('Jelenleg nincs egységesített képkártya','Kép elérhető');
    html=html.replace('<div class="fish-image-tools">','<div class="fish-image-tools" style="display:none">');

    html=html.replace('<div class="top-bar-title" id="page-title">Főoldal</div>','<div class="top-bar-title" id="page-title"><span class="ptitle-icon"><i class="ti ti-fish" id="page-title-icon-el"></i></span><span class="ptitle-wrap"><span class="ptitle-main" id="page-title-text">Főoldal</span><span class="ptitle-sub" id="page-title-sub">Horgász Napló</span></span></div>');

    const modalCss='<style id="fish-modal-fix-v11">#data-modal.show{align-items:flex-start;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:72px 16px 28px}#data-modal .modal-card{max-height:calc(100dvh - 92px);overflow-y:auto;-webkit-overflow-scrolling:touch}#data-modal .modal-body{padding-bottom:34px}</style>';

    const v1Css='<link rel="stylesheet" href="assets/v1-lombhullas.css?v=20260517-1"><link rel="stylesheet" href="assets/v1-lombhullas-v17.css?v=20260517-17"><link rel="stylesheet" href="assets/kp-v34-weather-card-rounding.css?v=20260519-34">';

    html=html.replace('</head>', v1Css + modalCss + '</head>');

    document.open();document.write(html);document.close();
  }catch(err){console.error(err);document.body.innerHTML='<div class="box"><div class="t">Betöltési hiba</div><div class="s">'+err.message+'</div></div>';}
})();
</script>
</body>
</html>
