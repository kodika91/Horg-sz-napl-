<!DOCTYPE html>

<head>

<style>
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:#f4f0e8;color:#2a2018;min-height:100vh;display:flex;align-items:center;justify-content:center}.box{max-width:520px;background:#faf8f4;border:1px solid rgba(120,100,70,.18);border-radius:18px;padding:24px;box-shadow:0 10px 35px rgba(60,40,10,.12)}.t{font-weight:800;font-size:18px;margin-bottom:8px}.s{color:#6b5840;line-height:1.5;font-size:14px}
</style>

<body>
<div class="box"><div class="t">Horgász Napló betöltése…</div><div class="s">Olvashatóbb időjárás ikonok betöltése.</div></div>
<script>
(async function(){
  const BLOB_SHA='13c1ef4ec206b1c233d505f0d6af7cdbba5a806c';
  const API='https://api.github.com/repos/kodika91/Horg-sz-napl-/git/blobs/'+BLOB_SHA;
  try{
    const res=await fetch(API,{cache:'no-store'});
    if(!res.ok) throw new Error('GitHub blob fetch failed: '+res.status);
    const blob=await res.json();
    let html=decodeURIComponent(escape(atob(String(blob.content||'').replace(/\s/g,''))));

    html=html.replace('v26.19.1.5 Halfaj betöltés hotfix','v26.19.1.14 időjárás ikon és olvashatóság javítás');
    html=html.replace('\napplyHuV2();\n\n\n// CSALI ADATBÁZIS','\n// applyHuV2 moved after helper constants.\n\n\n// CSALI ADATBÁZIS');
    html=html.replace('const PAGE_TITLES=','var PAGE_TITLES=');
    html=html.replace('let lat=null,lon=null,weatherCache=null,placeCache=null,forecast24Cache=[];','var lat=null,lon=null,weatherCache=null,placeCache=null,forecast24Cache=[];');
    html=html.replace("let fishFilter='all',fishSearch='';","var fishFilter='all',fishSearch='';");
    html=html.replace('const HU_PROTECTED_OR_NOT_KEEPABLE_IDS=new Set(','var HU_PROTECTED_OR_NOT_KEEPABLE_IDS=new Set(');
    html=html.replace('const HU_POND_OR_DECORATIVE_IDS=new Set','var HU_POND_OR_DECORATIVE_IDS=new Set');
    html=html.replace('Jelenleg nincs egységesített képkártya','Kép elérhető');
    html=html.replace('<div class="fish-image-tools">','<div class="fish-image-tools" style="display:none">');

    const anchor="function isHuCatchLogFish(f){return f && !isHuProtectedOrNotKeepableFish(f) && !isHuPondOnlyFish(f);}\n";
    if(html.includes(anchor) && !html.includes('active-ban-parser-v11')){
      const patch=`\n// active-ban-parser-v11\n(function(){\n  const rta=s=>String(s||'').replace(/\\bXII\\.\\s*/g,'12. ').replace(/\\bXI\\.\\s*/g,'11. ').replace(/\\bX\\.\\s*/g,'10. ').replace(/\\bIX\\.\\s*/g,'09. ').replace(/\\bVIII\\.\\s*/g,'08. ').replace(/\\bVII\\.\\s*/g,'07. ').replace(/\\bVI\\.\\s*/g,'06. ').replace(/\\bV\\.\\s*/g,'05. ').replace(/\\bIV\\.\\s*/g,'04. ').replace(/\\bIII\\.\\s*/g,'03. ').replace(/\\bII\\.\\s*/g,'02. ').replace(/\\bI\\.\\s*/g,'01. ');\n  const parse=t=>{const s=String(t||'');const a=[...s.matchAll(/(\\d{1,2})\\.\\s*(\\d{1,2})\\./g)].map(x=>[+x[1],+x[2]]);return a.length>=2?[a[0],a[1]]:null};\n  currentBanState=function(f){const p=parse((f&&f.ban)||'');const st=(f&&f.banStart)||(p&&p[0]);const en=(f&&f.banEnd)||(p&&p[1]);if(!st||!en)return false;const n=new Date(),m=n.getMonth()+1,d=n.getDate(),sm=+st[0],sd=+st[1],em=+en[0],ed=+en[1];return sm<=em?((m>sm||(m===sm&&d>=sd))&&(m<em||(m===em&&d<=ed))):((m>sm||(m===sm&&d>=sd))||(m<em||(m===em&&d<=ed)))};\n  if(typeof applyHuV2==='function')applyHuV2();\n  if(typeof FISH_DB!=='undefined'){const seen=new Map();const key=f=>String(f.latin||f.name||f.id||'').toLowerCase().normalize('NFD').replace(/[\\u0300-\\u036f]/g,'').replace(/[^a-z0-9]/g,'');FISH_DB.forEach(f=>{if(!f)return;if(f.ban)f.ban=rta(f.ban);if(f.huV2&&f.huV2.tilalmi_ido_2026)f.huV2.tilalmi_ido_2026=rta(f.huV2.tilalmi_ido_2026);if(f.huV2&&f.img)f.huV2.kep_statusz='Kép elérhető';const k=key(f);if(!seen.has(k))seen.set(k,f)});FISH_DB.length=0;seen.forEach(v=>FISH_DB.push(v));}\n  window.renderFishImageManager=function(){const e=document.getElementById('fish-image-manager')||document.querySelector('.fish-gallery-panel');if(e)e.style.display='none'};\n  window.setFishImageFilter=function(){window.renderFishImageManager()};\n})();\n`;
      html=html.replace(anchor,anchor+patch);
    }

    const quickAnchor='  </div>\n  <div class="fish-image-tools" style="display:none">';
    const quickBlock='  </div>\n  ${currentBanState(f)?\'<div class="fish-detail-warning"><b>Jelenleg fajlagos tilalom van érvényben.</b><br>Az érintett halfaj ilyenkor nem tartható meg, fogás után kíméletesen vissza kell engedni.</div>\':\'\'}\n  <div class="fish-detail-section fish-quick-data"><h4>Hal adatai</h4><div class="fish-detail-grid"><div class="fish-detail-box"><div class="lbl">Méretkorlát</div><div class="val">${escText(r.size)}</div></div><div class="fish-detail-box"><div class="lbl">Darabszám</div><div class="val">${escText(r.quota)}</div></div><div class="fish-detail-box"><div class="lbl">Tilalmi idő</div><div class="val">${escText(r.ban)}${currentBanState(f)?\' · jelenleg aktív\':\'\'}</div></div><div class="fish-detail-box"><div class="lbl">Élőhely</div><div class="val">${escText(f.habitat||\'–\')}</div></div><div class="fish-detail-box"><div class="lbl">Táplálék</div><div class="val">${escText(f.food||\'–\')}</div></div><div class="fish-detail-box"><div class="lbl">Ajánlott csali</div><div class="val">${escText(f.bait||\'–\')}</div></div></div></div>\n  <div class="fish-image-tools" style="display:none">';
    html=html.replace(quickAnchor,quickBlock);

    const modalCss=`<style id="fish-modal-fix-v11">#data-modal.show{align-items:flex-start;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:72px 16px 28px}#data-modal .modal-card{max-height:calc(100dvh - 92px);overflow-y:auto;-webkit-overflow-scrolling:touch}#data-modal .modal-body{padding-bottom:34px}#data-modal .fish-detail-hero{grid-template-columns:1fr!important;gap:18px!important}#data-modal .fish-detail-img{width:100%!important;height:230px!important;border-radius:22px!important}#data-modal .fish-detail-img img{width:100%!important;height:100%!important;object-fit:cover!important;display:block!important}#data-modal .fish-detail-grid{grid-template-columns:1fr 1fr!important}#data-modal .fish-id-pill-card:nth-child(2){display:none!important}@media(max-width:640px){#data-modal{padding:54px 10px 22px!important}#data-modal .modal-card{max-height:calc(100dvh - 70px)!important}#data-modal .fish-detail-grid{grid-template-columns:1fr!important}}</style>`;
    const weatherCss=`<style id="weather-readable-icons-v14">.weather-card{position:relative;overflow:hidden;border-radius:24px;box-shadow:0 12px 30px rgba(34,55,80,.12),inset 0 1px 0 rgba(255,255,255,.45)}.weather-card.theme-clear-day{background:radial-gradient(circle at 82% 14%,rgba(255,236,142,.9),rgba(255,236,142,0) 18%),linear-gradient(135deg,#a8dcff 0%,#c9edff 42%,#9fd7ff 100%)!important}.weather-card.theme-clear-night,.weather-card.theme-storm{background:linear-gradient(135deg,#607891 0%,#4d6782 52%,#3d5876 100%)!important}.weather-card.theme-cloudy{background:linear-gradient(135deg,#e9eef5 0%,#dae4ee 48%,#c6d2df 100%)!important}.weather-card.theme-rain{background:linear-gradient(135deg,#c4d3e2 0%,#aebfd2 50%,#8fa8bf 100%)!important}.weather-icon-big{min-width:96px;min-height:96px;border-radius:24px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.34)!important;border:1px solid rgba(255,255,255,.40)!important;box-shadow:inset 0 1px 0 rgba(255,255,255,.55),0 10px 24px rgba(30,50,75,.16)!important}.weather-art{filter:drop-shadow(0 5px 10px rgba(30,52,78,.22))}.weather-art .sun-core{background:radial-gradient(circle at 35% 35%,#fff7b8 0%,#ffd84d 45%,#f5aa18 100%)!important;box-shadow:0 0 26px rgba(255,188,38,.65),0 0 0 4px rgba(255,255,255,.18)!important}.weather-art .sun-glow{background:radial-gradient(circle,rgba(255,218,92,.72),rgba(255,218,92,.14) 56%,rgba(255,218,92,0) 74%)!important}.weather-art .cloud::before,.weather-art .cloud::after,.weather-art .cloud span{background:linear-gradient(180deg,#fff 0%,#e7f0f9 100%)!important;border:1px solid rgba(106,132,160,.22)!important;box-shadow:0 5px 12px rgba(42,64,92,.18)!important}.weather-art .moon-core{background:radial-gradient(circle at 35% 35%,#fff 0%,#eaf4ff 60%,#b8ccea 100%)!important;box-shadow:0 0 22px rgba(232,242,255,.55)!important}.weather-art .moon-cut{color:rgba(53,74,104,.58)!important}.weather-art .drop{background:linear-gradient(180deg,#a7dcff 0%,#3b91d1 100%)!important;box-shadow:0 2px 5px rgba(23,80,130,.28)}.weather-art .bolt{filter:drop-shadow(0 0 8px rgba(255,210,79,.75))!important}.forecast-icon{width:46px!important;height:46px!important;margin:8px auto 8px!important;border-radius:16px!important;background:rgba(255,255,255,.30)!important;border:1px solid rgba(255,255,255,.38)!important;display:flex!important;align-items:center!important;justify-content:center!important;box-shadow:inset 0 1px 0 rgba(255,255,255,.35),0 6px 14px rgba(28,50,75,.12)!important}.forecast-icon .weather-art{transform:scale(.96)}.forecast-item{background:rgba(255,255,255,.18)!important;border:1px solid rgba(255,255,255,.28)!important;box-shadow:inset 0 1px 0 rgba(255,255,255,.18),0 8px 18px rgba(24,40,60,.10)!important}.weather-card.theme-clear-day .forecast-item,.weather-card.theme-cloudy .forecast-item,.weather-card.theme-mist .forecast-item,.weather-card.theme-snow .forecast-item{background:rgba(255,255,255,.66)!important;border-color:rgba(100,128,156,.24)!important}.weather-card.theme-clear-night .forecast-item,.weather-card.theme-storm .forecast-item,.weather-card.theme-rain .forecast-item{background:rgba(255,255,255,.20)!important;border-color:rgba(255,255,255,.32)!important}.weather-card.theme-clear-night .weather-temp,.weather-card.theme-clear-night .weather-desc,.weather-card.theme-clear-night .weather-loc,.weather-card.theme-clear-night .wd-val,.weather-card.theme-clear-night .wd-lbl,.weather-card.theme-clear-night .forecast-title,.weather-card.theme-clear-night .forecast-sub,.weather-card.theme-clear-night .forecast-hour,.weather-card.theme-clear-night .forecast-temp,.weather-card.theme-clear-night .forecast-meta,.weather-card.theme-clear-night .w-btn,.weather-card.theme-storm .weather-temp,.weather-card.theme-storm .weather-desc,.weather-card.theme-storm .weather-loc,.weather-card.theme-storm .wd-val,.weather-card.theme-storm .wd-lbl,.weather-card.theme-storm .forecast-title,.weather-card.theme-storm .forecast-sub,.weather-card.theme-storm .forecast-hour,.weather-card.theme-storm .forecast-temp,.weather-card.theme-storm .forecast-meta,.weather-card.theme-storm .w-btn,.weather-card.theme-rain .forecast-meta,.weather-card.theme-rain .forecast-hour,.weather-card.theme-rain .forecast-temp{color:#f7fbff!important;text-shadow:0 1px 2px rgba(0,0,0,.26)!important}.weather-card.theme-clear-day .weather-temp,.weather-card.theme-clear-day .weather-desc,.weather-card.theme-clear-day .weather-loc,.weather-card.theme-clear-day .wd-val,.weather-card.theme-clear-day .wd-lbl,.weather-card.theme-clear-day .forecast-title,.weather-card.theme-clear-day .forecast-sub,.weather-card.theme-clear-day .forecast-hour,.weather-card.theme-clear-day .forecast-temp,.weather-card.theme-clear-day .forecast-meta,.weather-card.theme-clear-day .w-btn,.weather-card.theme-cloudy .forecast-meta,.weather-card.theme-cloudy .forecast-hour,.weather-card.theme-cloudy .forecast-temp{color:#243f55!important;text-shadow:none!important}.forecast-temp{font-size:18px!important;font-weight:850!important;letter-spacing:.01em}.forecast-hour{font-size:13px!important;font-weight:800!important}.forecast-meta{font-size:12px!important;line-height:1.35!important;font-weight:750!important;opacity:1!important}.wd-item{background:rgba(255,255,255,.24)!important;border:1px solid rgba(255,255,255,.28)!important}.weather-card.theme-clear-day .wd-item,.weather-card.theme-cloudy .wd-item{background:rgba(255,255,255,.60)!important;border-color:rgba(100,128,156,.22)!important}@media(max-width:640px){.weather-icon-big{min-width:88px;min-height:88px;border-radius:22px}.weather-temp{font-size:38px}.forecast-meta{font-size:12px!important}.forecast-item{padding:12px 10px!important}}</style>`;
    html=html.replace('</head>',modalCss+weatherCss+'</head>');
    html=html.replace(/\bXII\.\s*/g,'12. ').replace(/\bXI\.\s*/g,'11. ').replace(/\bX\.\s*/g,'10. ').replace(/\bIX\.\s*/g,'09. ').replace(/\bVIII\.\s*/g,'08. ').replace(/\bVII\.\s*/g,'07. ').replace(/\bVI\.\s*/g,'06. ').replace(/\bV\.\s*/g,'05. ').replace(/\bIV\.\s*/g,'04. ').replace(/\bIII\.\s*/g,'03. ').replace(/\bII\.\s*/g,'02. ').replace(/\bI\.\s*/g,'01. ');
    document.open();document.write(html);document.close();
  }catch(err){console.error(err);document.body.innerHTML='<div class="box"><div class="t">Betöltési hiba</div><div class="s">Nem sikerült betölteni az alkalmazást.</div></div>'}
})();
</script>
