<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horgász Napló</title>
<style>
  body{margin:0;font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:#f4f0e8;color:#2a2018;min-height:100vh;display:flex;align-items:center;justify-content:center}
  .box{max-width:560px;background:#faf8f4;border:1px solid rgba(120,100,70,.18);border-radius:18px;padding:24px;box-shadow:0 10px 35px rgba(60,40,10,.12)}
  .t{font-weight:800;font-size:18px;margin-bottom:8px}.s{color:#6b5840;line-height:1.5;font-size:14px}.e{color:#9a2f2f;font-size:13px;margin-top:10px;white-space:pre-wrap}
</style>
</head>
<body>
<div class="box"><div class="t">Horgász Napló betöltése…</div><div class="s">Alkalmazás előkészítése…</div></div>
<script>
(async function(){
  const APP_SOURCES=[
    'https://raw.githubusercontent.com/kodika91/Horg-sz-napl-/main/assets/app.html',
    'https://raw.githubusercontent.com/kodika91/Horg-sz-napl-/22233b8c04acdd3ad868a9b78ed71514c0d58365/assets/app.html'
  ];

  async function fetchFirstAvailable(urls){
    let lastErr=null;
    for(const url of urls){
      try{
        const res=await fetch(url,{cache:'no-store'});
        if(!res.ok) throw new Error(url+' → HTTP '+res.status);
        return await res.text();
      }catch(err){
        lastErr=err;
        console.warn('[loader] sikertelen forrás:',err);
      }
    }
    throw lastErr||new Error('Nem található betölthető app.html forrás.');
  }

  function addSafePatches(html){
    html=html.replace('v26.19.1.5 Halfaj betöltés hotfix','v26.19.1.26 stabil betöltő + debug hotfix');

    // A korábbi loaderben ez a csere túl korán futott, és ütközhetett a később deklarált helper konstansokkal.
    html=html.replace('\napplyHuV2();\n\n\n// CSALI ADATBÁZIS','\n// applyHuV2 moved after helper constants by stable loader.\n\n\n// CSALI ADATBÁZIS');

    // A document.write által betöltött appban ezek globális szinten újradeklarálódhatnak; var biztonságosabb patch környezetben.
    html=html.replace('const PAGE_TITLES=','var PAGE_TITLES=');
    html=html.replace('let lat=null,lon=null,weatherCache=null,placeCache=null,forecast24Cache=[];','var lat=null,lon=null,weatherCache=null,placeCache=null,forecast24Cache=[];');
    html=html.replace("let fishFilter='all',fishSearch='';","var fishFilter='all',fishSearch='';");
    html=html.replace('const HU_PROTECTED_OR_NOT_KEEPABLE_IDS=new Set(','var HU_PROTECTED_OR_NOT_KEEPABLE_IDS=new Set(');
    html=html.replace('const HU_POND_OR_DECORATIVE_IDS=new Set','var HU_POND_OR_DECORATIVE_IDS=new Set');
    html=html.replace('Jelenleg nincs egységesített képkártya','Kép elérhető');
    html=html.replace('<div class="fish-image-tools">','<div class="fish-image-tools" style="display:none">');

    const anchor='function isHuCatchLogFish(f){return f && !isHuProtectedOrNotKeepableFish(f) && !isHuPondOnlyFish(f);}\n';
    if(html.includes(anchor) && !html.includes('stable-active-ban-parser-v26')){
      const banPatch=`\n// stable-active-ban-parser-v26\n(function(){\n  function rta(s){return String(s||'').replace(/\\bXII\\.\\s*/g,'12. ').replace(/\\bXI\\.\\s*/g,'11. ').replace(/\\bX\\.\\s*/g,'10. ').replace(/\\bIX\\.\\s*/g,'09. ').replace(/\\bVIII\\.\\s*/g,'08. ').replace(/\\bVII\\.\\s*/g,'07. ').replace(/\\bVI\\.\\s*/g,'06. ').replace(/\\bV\\.\\s*/g,'05. ').replace(/\\bIV\\.\\s*/g,'04. ').replace(/\\bIII\\.\\s*/g,'03. ').replace(/\\bII\\.\\s*/g,'02. ').replace(/\\bI\\.\\s*/g,'01. ');}\n  function parse(t){var a=[...String(t||'').matchAll(/(\\d{1,2})\\.\\s*(\\d{1,2})\\./g)].map(function(x){return[+x[1],+x[2]]});return a.length>=2?[a[0],a[1]]:null;}\n  window.currentBanState=function(f){var p=parse((f&&f.ban)||'');var st=(f&&f.banStart)||(p&&p[0]);var en=(f&&f.banEnd)||(p&&p[1]);if(!st||!en)return false;var n=new Date(),m=n.getMonth()+1,d=n.getDate(),sm=+st[0],sd=+st[1],em=+en[0],ed=+en[1];return sm<=em?((m>sm||(m===sm&&d>=sd))&&(m<em||(m===em&&d<=ed))):((m>sm||(m===sm&&d>=sd))||(m<em||(m===em&&d<=ed)));};\n  try{if(typeof applyHuV2==='function')applyHuV2();}catch(e){console.warn('[fish] applyHuV2 hiba:',e);}\n  try{if(typeof FISH_DB!=='undefined'&&Array.isArray(FISH_DB)){var seen=new Map();var key=function(f){return String(f.latin||f.name||f.id||'').toLowerCase().normalize('NFD').replace(/[\\u0300-\\u036f]/g,'').replace(/[^a-z0-9]/g,'')};FISH_DB.forEach(function(f){if(!f)return;if(f.ban)f.ban=rta(f.ban);if(f.huV2&&f.huV2.tilalmi_ido_2026)f.huV2.tilalmi_ido_2026=rta(f.huV2.tilalmi_ido_2026);if(f.huV2&&f.img)f.huV2.kep_statusz='Kép elérhető';var k=key(f);if(!seen.has(k))seen.set(k,f);});FISH_DB.length=0;seen.forEach(function(v){FISH_DB.push(v)});}}catch(e){console.warn('[fish] adatjavítás hiba:',e);}\n  window.renderFishImageManager=function(){var e=document.getElementById('fish-image-manager')||document.querySelector('.fish-gallery-panel');if(e)e.style.display='none';};\n  window.setFishImageFilter=function(){window.renderFishImageManager();};\n})();\n`;
      html=html.replace(anchor,anchor+banPatch);
    }

    const quickAnchor='  </div>\n  <div class="fish-image-tools" style="display:none">';
    if(html.includes(quickAnchor) && !html.includes('fish-quick-data')){
      const quickBlock='  </div>\n  ${currentBanState(f)?\'<div class="fish-detail-warning"><b>Jelenleg fajlagos tilalom van érvényben.</b><br>Az érintett halfaj ilyenkor nem tartható meg, fogás után kíméletesen vissza kell engedni.</div>\':\'\'}\n  <div class="fish-detail-section fish-quick-data"><h4>Hal adatai</h4><div class="fish-detail-grid"><div class="fish-detail-box"><div class="lbl">Méretkorlát</div><div class="val">${escText(r.size)}</div></div><div class="fish-detail-box"><div class="lbl">Darabszám</div><div class="val">${escText(r.quota)}</div></div><div class="fish-detail-box"><div class="lbl">Tilalmi idő</div><div class="val">${escText(r.ban)}${currentBanState(f)?\' · jelenleg aktív\':\'\'}</div></div><div class="fish-detail-box"><div class="lbl">Élőhely</div><div class="val">${escText(f.habitat||\'–\')}</div></div><div class="fish-detail-box"><div class="lbl">Táplálék</div><div class="val">${escText(f.food||\'–\')}</div></div><div class="fish-detail-box"><div class="lbl">Ajánlott csali</div><div class="val">${escText(f.bait||\'–\')}</div></div></div></div>\n  <div class="fish-image-tools" style="display:none">';
      html=html.replace(quickAnchor,quickBlock);
    }

    const modalCss=`<style id="stable-fixes-v26">#data-modal.show{align-items:flex-start;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:72px 16px 28px}#data-modal .modal-card{max-height:calc(100dvh - 92px);overflow-y:auto;-webkit-overflow-scrolling:touch}#data-modal .modal-body{padding-bottom:34px}#data-modal .fish-detail-hero{grid-template-columns:1fr!important;gap:18px!important}#data-modal .fish-detail-img{width:100%!important;height:230px!important;border-radius:22px!important}#data-modal .fish-detail-img img{width:100%!important;height:100%!important;object-fit:cover!important;display:block!important}#data-modal .fish-detail-grid{grid-template-columns:1fr 1fr!important}#data-modal .fish-id-pill-card:nth-child(2){display:none!important}.fish-image-tools,.fish-gallery-panel{display:none!important}.top-bar-title{display:flex!important;align-items:center!important;gap:12px!important}@media(max-width:640px){#data-modal{padding:54px 10px 22px!important}#data-modal .modal-card{max-height:calc(100dvh - 70px)!important}#data-modal .fish-detail-grid{grid-template-columns:1fr!important}}</style>`;
    html=html.replace('</head>',modalCss+'</head>');

    // Külső kiegészítők külön scriptként, nem törékeny beágyazott string-cserével.
    const extras='\n<script src="assets/fish-patch.js?v=26" defer><\\/script>\n<script src="assets/insights.js?v=26" defer><\\/script>\n';
    html=html.replace('</body>',extras+'</body>');
    return html;
  }

  try{
    let html=await fetchFirstAvailable(APP_SOURCES);
    html=addSafePatches(html);
    document.open();
    document.write(html);
    document.close();
  }catch(err){
    console.error('[loader] végzetes betöltési hiba:',err);
    document.body.innerHTML='<div class="box"><div class="t">Betöltési hiba</div><div class="s">Nem sikerült betölteni az alkalmazást.</div><div class="e">'+String(err&&err.message||err).replace(/[<>&]/g,function(c){return {'<':'&lt;','>':'&gt;','&':'&amp;'}[c];})+'</div></div>';
  }
})();
</script>
</body>
</html>
