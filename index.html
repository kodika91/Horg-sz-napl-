<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Horgász Napló</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <aside class="sidebar">
    <div class="brand"><span>🐟</span><b>HORGÁSZ<br>NAPLÓ</b></div>
    <nav>
      <button data-view="new" class="active">➕ Új bejegyzés</button>
      <button data-view="logs">📒 Naplóim</button>
      <button data-view="waters">📍 Helyszínek</button>
      <button data-view="baits">🪱 Csalik</button>
      <button data-view="feeds">🌽 Etetőanyagok</button>
      <button data-view="hooks">🪝 Horgok</button>
      <button data-view="methods">🎣 Módszerek</button>
      <button data-view="fish">🐟 Halfajok</button>
      <button data-view="bans">⛔ Aktuális tilalmak</button>
      <button data-view="stats">📊 Statisztikák</button>
      <button data-view="data">💾 Export / Import</button>
    </nav>
    <div class="sideWeather" id="sideWeather">
      <small>🌦️ Jelenlegi időjárás</small>
      <h2>--°C</h2>
      <p>GPS vagy koordináta után lekérhető.</p>
    </div>
  </aside>

  <main class="app">
    <header class="top">
      <h1>HORGÁSZ NAPLÓ</h1>
      <p>Modern, reszponzív felület – minden fontos adat egy helyen</p>
    </header>
    <section id="view-new" class="view show"></section>
    <section id="view-logs" class="view"></section>
    <section id="view-waters" class="view"></section>
    <section id="view-baits" class="view"></section>
    <section id="view-feeds" class="view"></section>
    <section id="view-hooks" class="view"></section>
    <section id="view-methods" class="view"></section>
    <section id="view-fish" class="view"></section>
    <section id="view-bans" class="view"></section>
    <section id="view-stats" class="view"></section>
    <section id="view-data" class="view"></section>
  </main>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
