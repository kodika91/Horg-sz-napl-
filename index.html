<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horgász Napló</title>
<style>body{margin:0;font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:#f4f0e8;color:#2a2018;min-height:100vh;display:flex;align-items:center;justify-content:center}.box{max-width:520px;background:#faf8f4;border:1px solid rgba(120,100,70,.18);border-radius:18px;padding:24px;box-shadow:0 10px 35px rgba(60,40,10,.12)}.t{font-weight:800;font-size:18px;margin-bottom:8px}.s{color:#6b5840;line-height:1.5;font-size:14px}</style>
</head>
<body>
<div class="box"><div class="t">Horgász Napló betöltése…</div><div class="s">V1 · Lombhullás felület előkészítése…</div></div>
<script>
(async function(){
  try{
    const res2=await fetch('https://raw.githubusercontent.com/kodika91/Horg-sz-napl-/22233b8c04acdd3ad868a9b78ed71514c0d58365/assets/app.html',{cache:'no-store'});
    if(!res2.ok) throw new Error('app.html fetch failed: '+res2.status);
    let html=await res2.text();

    html=html.replace('v26.19.1.5 Halfaj betöltés hotfix','v26.19.1.26 V1 Lombhullás V6/V7');

    // A tegnapi működő verzió kritikus indulási javításai megmaradnak.
    html=html.replace('\napplyHuV2();\n\n\n// CSALI ADATBÁZIS','\n// applyHuV2 moved after helper constants.\n\n\n// CSALI ADATBÁZIS');
    html=html.replace('const PAGE_TITLES=','var PAGE_TITLES=');
    html=html.replace('let lat=null,lon=null,weatherCache=null,placeCache=null,forecast24Cache=[];','var lat=null,lon=null,weatherCache=null,placeCache=null,forecast24Cache=[];');
    html=html.replace("let fishFilter='all',fishSearch='';","var fishFilter='all',fishSearch='';");
    html=html.replace('const HU_PROTECTED_OR_NOT_KEEPABLE_IDS=new Set(','var HU_PROTECTED_OR_NOT_KEEPABLE_IDS=new Set(');
    html=html.replace('const HU_POND_OR_DECORATIVE_IDS=new Set','var HU_POND_OR_DECORATIVE_IDS=new Set');
    html=html.replace('Jelenleg nincs egységesített képkártya','Kép elérhető');
    html=html.replace('<div class="fish-image-tools">','<div class="fish-image-tools" style="display:none">');

    // Fejléc: a meglévő működő topbar kap ikon+alcím struktúrát, logikai változtatás nélkül.
    html=html.replace(
      '<div class="top-bar-title" id="page-title">Főoldal</div>',
      '<div class="top-bar-title" id="page-title"><span class="ptitle-icon"><i class="ti ti-fish" id="page-title-icon-el"></i></span><span class="ptitle-wrap"><span class="ptitle-main" id="page-title-text">Főoldal</span><span class="ptitle-sub" id="page-title-sub">Horgász Napló</span></span></div>'
    );
    html=html.replace(
      "document.getElementById('page-title').textContent=PAGE_TITLES[id]||id;",
      "document.getElementById('page-title-text').textContent=PAGE_TITLES[id]||id;(function(){var ic={home:'ti-home',sessions:'ti-list','new-session':'ti-fish',locations:'ti-map-pin',map:'ti-map',spotfinder:'ti-search',fish:'ti-fish',baits:'ti-droplet',gear:'ti-tool',stats:'ti-chart-bar',export:'ti-download',settings:'ti-settings','github-sync':'ti-cloud','session-detail':'ti-fish'};var sb={home:'Horgász Napló',sessions:'Előzmények','new-session':'Naplózás',locations:'Helyszínek',map:'Térkép',spotfinder:'Helykereső',fish:'Halfajok',baits:'Csali & Etetőanyag',gear:'Felszerelés',stats:'Statisztika',export:'Adatmentés',settings:'Beállítások','github-sync':'Szinkronizáció','session-detail':'Részletek'};var ei=document.getElementById('page-title-icon-el');if(ei)ei.className='ti '+(ic[id]||'ti-fish');var es=document.getElementById('page-title-sub');if(es)es.textContent=sb[id]||'Horgász Napló';})()"
    );

    // A halfajos működést nem alakítjuk át, csak a tegnapi működő sorrendi javítást tartjuk meg.
    const anchor="function isHuCatchLogFish(f){return f && !isHuProtectedOrNotKeepableFish(f) && !isHuPondOnlyFish(f);}\n";
    if(html.includes(anchor) && !html.includes('active-ban-parser-v11')){
      const banPatch=`\n// active-ban-parser-v11\n(function(){\n  const rta=s=>String(s||'').replace(/\\bXII\\.\\s*/g,'12. ').replace(/\\bXI\\.\\s*/g,'11. ').replace(/\\bX\\.\\s*/g,'10. ').replace(/\\bIX\\.\\s*/g,'09. ').replace(/\\bVIII\\.\\s*/g,'08. ').replace(/\\bVII\\.\\s*/g,'07. ').replace(/\\bVI\\.\\s*/g,'06. ').replace(/\\bV\\.\\s*/g,'05. ').replace(/\\bIV\\.\\s*/g,'04. ').replace(/\\bIII\\.\\s*/g,'03. ').replace(/\\bII\\.\\s*/g,'02. ').replace(/\\bI\\.\\s*/g,'01. ');\n  const parse=t=>{const s=String(t||'');const a=[...s.matchAll(/(\\d{1,2})\\.\\s*(\\d{1,2})\\./g)].map(x=>[+x[1],+x[2]]);return a.length>=2?[a[0],a[1]]:null};\n  currentBanState=function(f){const p=parse((f&&f.ban)||'');const st=(f&&f.banStart)||(p&&p[0]);const en=(f&&f.banEnd)||(p&&p[1]);if(!st||!en)return false;const n=new Date(),m=n.getMonth()+1,d=n.getDate(),sm=+st[0],sd=+st[1],em=+en[0],ed=+en[1];return sm<=em?((m>sm||(m===sm&&d>=sd))&&(m<em||(m===em&&d<=ed))):((m>sm||(m===sm&&d>=sd))||(m<em||(m===em&&d<=ed)))};\n  if(typeof applyHuV2==='function')applyHuV2();\n  if(typeof FISH_DB!=='undefined'){const seen=new Map();const key=f=>String(f.latin||f.name||f.id||'').toLowerCase().normalize('NFD').replace(/[\\u0300-\\u036f]/g,'').replace(/[^a-z0-9]/g,'');FISH_DB.forEach(f=>{if(!f)return;if(f.ban)f.ban=rta(f.ban);if(f.huV2&&f.huV2.tilalmi_ido_2026)f.huV2.tilalmi_ido_2026=rta(f.huV2.tilalmi_ido_2026);if(f.huV2&&f.img)f.huV2.kep_statusz='Kép elérhető';const k=key(f);if(!seen.has(k))seen.set(k,f)});FISH_DB.length=0;seen.forEach(v=>FISH_DB.push(v));}\n  window.renderFishImageManager=function(){const e=document.getElementById('fish-image-manager')||document.querySelector('.fish-gallery-panel');if(e)e.style.display='none'};\n  window.setFishImageFilter=function(){window.renderFishImageManager()};\n})();\n`;
      html=html.replace(anchor,anchor+banPatch);
    }

    // Modal biztonsági CSS marad, hogy mobilon ne vágódjon le.
    const modalCss=`<style id="fish-modal-fix-v11">#data-modal.show{align-items:flex-start;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:72px 16px 28px}#data-modal .modal-card{max-height:calc(100dvh - 92px);overflow-y:auto;-webkit-overflow-scrolling:touch}#data-modal .modal-body{padding-bottom:34px}#data-modal .fish-detail-hero{grid-template-columns:1fr!important;gap:18px!important}#data-modal .fish-detail-img{width:100%!important;height:230px!important;border-radius:22px!important}#data-modal .fish-detail-img img{width:100%!important;height:100%!important;object-fit:cover!important;display:block!important}#data-modal .fish-detail-grid{grid-template-columns:1fr 1fr!important}#data-modal .fish-id-pill-card:nth-child(2){display:none!important}@media(max-width:640px){#data-modal{padding:54px 10px 22px!important}#data-modal .modal-card{max-height:calc(100dvh - 70px)!important}#data-modal .fish-detail-grid{grid-template-columns:1fr!important}}</style>`;
    const topbarCss=`<style id="topbar-enhanced-v1">.top-bar-title{display:flex!important;align-items:center!important;gap:12px!important}.ptitle-icon{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#5a7042 0%,#a85a2b 100%);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 14px rgba(90,112,66,.24),inset 0 1px 0 rgba(255,255,255,.25)}.ptitle-icon i{font-size:20px;color:#fff}.ptitle-wrap{display:flex;flex-direction:column;gap:2px}.ptitle-main{font-family:'Playfair Display',Georgia,serif;font-size:19px;font-weight:700;color:var(--text);line-height:1.2}.ptitle-sub{font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:#a85a2b;opacity:.78}@media(max-width:768px){.ptitle-icon{width:34px;height:34px;border-radius:10px}.ptitle-icon i{font-size:17px}.ptitle-main{font-size:16px}}</style>`;
    const v1Css='<link id="v1-lombhullas-css" rel="stylesheet" href="assets/v1-lombhullas.css?v=20260517-1"><link id="v1-lombhullas-v6-css" rel="stylesheet" href="assets/v1-lombhullas-v6.css?v=20260517-7"><link id="v1-lombhullas-v7-css" rel="stylesheet" href="assets/v1-lombhullas-v7.css?v=20260517-7">';

    // V6: főoldal tényleges DOM-sorrend rendezése. Csak meglévő elemeket mozgat, adatot/funkciót nem módosít.
    const homeOrderScript=`<script id="v1-home-order-script">\n(function(){\n  function textOf(el){return (el&&el.textContent||'').toLowerCase();}\n  function closestDirect(home,el){while(el&&el.parentElement&&el.parentElement!==home)el=el.parentElement;return el&&el.parentElement===home?el:null;}\n  function moveAfter(ref,node){if(ref&&node&&ref!==node&&ref.parentNode)ref.parentNode.insertBefore(node,ref.nextSibling);}\n  function reorderHome(){\n    try{\n      var home=document.getElementById('page-home'); if(!home)return;\n      var weather=home.querySelector('.weather-card');\n      var cta=home.querySelector('.main-cta');\n      if(!weather||!cta)return;\n      var weatherBlock=closestDirect(home,weather)||weather;\n      var ctaBlock=closestDirect(home,cta)||cta;\n      if(home.firstElementChild!==weatherBlock)home.insertBefore(weatherBlock,home.firstElementChild);\n      moveAfter(weatherBlock,ctaBlock);\n      var after=ctaBlock;\n      Array.from(home.children).forEach(function(ch){\n        if(ch===weatherBlock||ch===ctaBlock)return;\n        var t=textOf(ch);\n        if(ch.classList.contains('ban-alert')||t.includes('tilalmi')||t.includes('legutóbbi horgászat')||t.includes('még nincs horgászat')){\n          moveAfter(after,ch); after=ch;\n        }\n      });\n    }catch(e){console.warn('[V1] főoldal sorrend rendezés hiba:',e);}\n  }\n  document.addEventListener('DOMContentLoaded',function(){reorderHome();setTimeout(reorderHome,250);setTimeout(reorderHome,900);});\n  window.addEventListener('load',function(){setTimeout(reorderHome,80);});\n  var oldShow=window.showPage;\n  if(typeof oldShow==='function'){window.showPage=function(id){var r=oldShow.apply(this,arguments);setTimeout(reorderHome,60);return r;};}\n})();\n<\/script>`;

    html=html.replace('</head>', v1Css + modalCss + topbarCss + '</head>');
    html=html.replace('</body>', homeOrderScript + '</body>');

    document.open();document.write(html);document.close();
  }catch(err){console.error(err);document.body.innerHTML='<div class="box"><div class="t">Betöltési hiba</div><div class="s">'+err.message+'</div></div>';}
})();
</script>
</body>
</html>
