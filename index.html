<head>

<style>

<body>
<div class="box"><div class="t">Horgász Napló betöltése…</div><div class="s">Új időjárás nézet betöltése.</div></div>
<script>
(async function(){
  const BLOB_SHA='13c1ef4ec206b1c233d505f0d6af7cdbba5a806c';
  const API='https://api.github.com/repos/kodika91/Horg-sz-napl-/git/blobs/'+BLOB_SHA;
  try{
    const res=await fetch(API,{cache:'no-store'});
    if(!res.ok) throw new Error('GitHub blob fetch failed: '+res.status);
    const blob=await res.json();
    let html=decodeURIComponent(escape(atob(String(blob.content||'').replace(/\s/g,''))));

    html=html.replace('v26.19.1.5 Halfaj betöltés hotfix','v26.19.1.15 Apple-szerű időjárás layout');
    html=html.replace('\napplyHuV2();\n\n\n// CSALI ADATBÁZIS','\n// applyHuV2 moved after helper constants.\n\n\n// CSALI ADATBÁZIS');
    html=html.replace('const PAGE_TITLES=','var PAGE_TITLES=');
    html=html.replace('let lat=null,lon=null,weatherCache=null,placeCache=null,forecast24Cache=[];','var lat=null,lon=null,weatherCache=null,placeCache=null,forecast24Cache=[];');
    html=html.replace("let fishFilter='all',fishSearch='';","var fishFilter='all',fishSearch='';");
    html=html.replace('const HU_PROTECTED_OR_NOT_KEEPABLE_IDS=new Set(','var HU_PROTECTED_OR_NOT_KEEPABLE_IDS=new Set(');
    html=html.replace('const HU_POND_OR_DECORATIVE_IDS=new Set','var HU_POND_OR_DECORATIVE_IDS=new Set');
    html=html.replace('Jelenleg nincs egységesített képkártya','Kép elérhető');
    html=html.replace('<div class="fish-image-tools">','<div class="fish-image-tools" style="display:none">');

    const anchor="function isHuCatchLogFish(f){return f && !isHuProtectedOrNotKeepableFish(f) && !isHuPondOnlyFish(f);}\n";
    if(html.includes(anchor) && !html.includes('active-ban-parser-v11')){
      const patch=`\n// active-ban-parser-v11\n(function(){\n  const rta=s=>String(s||'').replace(/\\bXII\\.\\s*/g,'12. ').replace(/\\bXI\\.\\s*/g,'11. ').replace(/\\bX\\.\\s*/g,'10. ').replace(/\\bIX\\.\\s*/g,'09. ').replace(/\\bVIII\\.\\s*/g,'08. ').replace(/\\bVII\\.\\s*/g,'07. ').replace(/\\bVI\\.\\s*/g,'06. ').replace(/\\bV\\.\\s*/g,'05. ').replace(/\\bIV\\.\\s*/g,'04. ').replace(/\\bIII\\.\\s*/g,'03. ').replace(/\\bII\\.\\s*/g,'02. ').replace(/\\bI\\.\\s*/g,'01. ');\n  const parse=t=>{const s=String(t||'');const a=[...s.matchAll(/(\\d{1,2})\\.\\s*(\\d{1,2})\\./g)].map(x=>[+x[1],+x[2]]);return a.length>=2?[a[0],a[1]]:null};\n  currentBanState=function(f){const p=parse((f&&f.ban)||'');const st=(f&&f.banStart)||(p&&p[0]);const en=(f&&f.banEnd)||(p&&p[1]);if(!st||!en)return false;const n=new Date(),m=n.getMonth()+1,d=n.getDate(),sm=+st[0],sd=+st[1],em=+en[0],ed=+en[1];return sm<=em?((m>sm||(m===sm&&d>=sd))&&(m<em||(m===em&&d<=ed))):((m>sm||(m===sm&&d>=sd))||(m<em||(m===em&&d<=ed)))};\n  if(typeof applyHuV2==='function')applyHuV2();\n  if(typeof FISH_DB!=='undefined'){const seen=new Map();const key=f=>String(f.latin||f.name||f.id||'').toLowerCase().normalize('NFD').replace(/[\\u0300-\\u036f]/g,'').replace(/[^a-z0-9]/g,'');FISH_DB.forEach(f=>{if(!f)return;if(f.ban)f.ban=rta(f.ban);if(f.huV2&&f.huV2.tilalmi_ido_2026)f.huV2.tilalmi_ido_2026=rta(f.huV2.tilalmi_ido_2026);if(f.huV2&&f.img)f.huV2.kep_statusz='Kép elérhető';const k=key(f);if(!seen.has(k))seen.set(k,f)});FISH_DB.length=0;seen.forEach(v=>FISH_DB.push(v));}\n  window.renderFishImageManager=function(){const e=document.getElementById('fish-image-manager')||document.querySelector('.fish-gallery-panel');if(e)e.style.display='none'};\n  window.setFishImageFilter=function(){window.renderFishImageManager()};\n})();\n`;
      html=html.replace(anchor,anchor+patch);
    }

    const quickAnchor='  </div>\n  <div class="fish-image-tools" style="display:none">';
    const quickBlock='  </div>\n  ${currentBanState(f)?\'<div class="fish-detail-warning"><b>Jelenleg fajlagos tilalom van érvényben.</b><br>Az érintett halfaj ilyenkor nem tartható meg, fogás után kíméletesen vissza kell engedni.</div>\':\'\'}\n  <div class="fish-detail-section fish-quick-data"><h4>Hal adatai</h4><div class="fish-detail-grid"><div class="fish-detail-box"><div class="lbl">Méretkorlát</div><div class="val">${escText(r.size)}</div></div><div class="fish-detail-box"><div class="lbl">Darabszám</div><div class="val">${escText(r.quota)}</div></div><div class="fish-detail-box"><div class="lbl">Tilalmi idő</div><div class="val">${escText(r.ban)}${currentBanState(f)?\' · jelenleg aktív\':\'\'}</div></div><div class="fish-detail-box"><div class="lbl">Élőhely</div><div class="val">${escText(f.habitat||\'–\')}</div></div><div class="fish-detail-box"><div class="lbl">Táplálék</div><div class="val">${escText(f.food||\'–\')}</div></div><div class="fish-detail-box"><div class="lbl">Ajánlott csali</div><div class="val">${escText(f.bait||\'–\')}</div></div></div></div>\n  <div class="fish-image-tools" style="display:none">';
    html=html.replace(quickAnchor,quickBlock);

    const modalCss=`<style id="fish-modal-fix-v11">#data-modal.show{align-items:flex-start;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:72px 16px 28px}#data-modal .modal-card{max-height:calc(100dvh - 92px);overflow-y:auto;-webkit-overflow-scrolling:touch}#data-modal .modal-body{padding-bottom:34px}#data-modal .fish-detail-hero{grid-template-columns:1fr!important;gap:18px!important}#data-modal .fish-detail-img{width:100%!important;height:230px!important;border-radius:22px!important}#data-modal .fish-detail-img img{width:100%!important;height:100%!important;object-fit:cover!important;display:block!important}#data-modal .fish-detail-grid{grid-template-columns:1fr 1fr!important}#data-modal .fish-id-pill-card:nth-child(2){display:none!important}@media(max-width:640px){#data-modal{padding:54px 10px 22px!important}#data-modal .modal-card{max-height:calc(100dvh - 70px)!important}#data-modal .fish-detail-grid{grid-template-columns:1fr!important}}</style>`;
    const weatherCss=`<style id="weather-app-layout-v15">body:has(#weather-page),body:has(.weather-card){background:linear-gradient(180deg,#d9e7ef 0%,#f5f1e8 78%)!important}.weather-card{position:relative!important;overflow:hidden!important;border:0!important;border-radius:34px!important;padding:32px 28px 26px!important;min-height:420px!important;background:radial-gradient(circle at 14% 12%,rgba(255,255,255,.95) 0,rgba(255,255,255,.55) 10%,rgba(255,255,255,0) 24%),radial-gradient(circle at 76% 24%,rgba(255,236,138,.62),rgba(255,236,138,0) 22%),linear-gradient(180deg,rgba(122,179,219,.72) 0%,rgba(104,164,211,.58) 48%,rgba(183,221,238,.76) 100%)!important;box-shadow:0 18px 46px rgba(36,66,95,.18),inset 0 1px 0 rgba(255,255,255,.55)!important;color:#fff!important}.weather-card::before{content:''!important;position:absolute!important;inset:0!important;background:linear-gradient(180deg,rgba(255,255,255,.10),rgba(255,255,255,0) 30%),radial-gradient(circle at 16% 15%,rgba(255,255,255,.45),rgba(255,255,255,0) 20%)!important;opacity:1!important}.weather-card::after{content:''!important;position:absolute!important;left:-70px!important;top:-70px!important;width:230px!important;height:230px!important;border-radius:50%!important;background:radial-gradient(circle,rgba(255,255,255,.92) 0%,rgba(255,244,180,.42) 24%,rgba(255,255,255,0) 62%)!important;filter:blur(2px)!important;pointer-events:none!important}.weather-inner{position:relative!important;z-index:1!important;display:grid!important;grid-template-columns:120px 1fr!important;gap:22px!important;align-items:center!important}.weather-icon-big{width:112px!important;height:112px!important;min-width:112px!important;min-height:112px!important;border-radius:32px!important;background:rgba(255,255,255,.22)!important;border:1px solid rgba(255,255,255,.28)!important;box-shadow:inset 0 1px 0 rgba(255,255,255,.38),0 16px 34px rgba(37,72,105,.16)!important;backdrop-filter:blur(10px)!important}.weather-temp{font-size:64px!important;line-height:.95!important;color:#fff!important;font-weight:780!important;text-shadow:0 2px 12px rgba(30,70,100,.22)!important}.weather-desc{font-size:24px!important;color:#fff!important;font-weight:720!important;text-shadow:0 2px 10px rgba(30,70,100,.18)!important}.weather-loc{font-size:15px!important;color:rgba(255,255,255,.90)!important;font-weight:650!important}.weather-details{position:relative!important;z-index:1!important;margin-top:26px!important;display:grid!important;grid-template-columns:repeat(4,minmax(0,1fr))!important;gap:10px!important}.wd-item{background:rgba(255,255,255,.18)!important;border:1px solid rgba(255,255,255,.28)!important;border-radius:18px!important;padding:12px 10px!important;backdrop-filter:blur(10px)!important;box-shadow:inset 0 1px 0 rgba(255,255,255,.25)!important}.wd-val{color:#fff!important;font-size:20px!important;font-weight:800!important;text-shadow:0 1px 6px rgba(0,0,0,.18)!important}.wd-lbl{color:rgba(255,255,255,.86)!important;font-size:12px!important;font-weight:700!important}.weather-actions{position:relative!important;z-index:1!important;margin-top:20px!important}.w-btn{background:rgba(255,255,255,.18)!important;border:1px solid rgba(255,255,255,.30)!important;color:#fff!important;font-weight:750!important;backdrop-filter:blur(10px)!important}.forecast-wrap{position:relative!important;z-index:1!important;margin-top:28px!important;border-radius:26px!important;background:rgba(35,90,140,.22)!important;border:1px solid rgba(255,255,255,.24)!important;box-shadow:inset 0 1px 0 rgba(255,255,255,.22)!important;backdrop-filter:blur(10px)!important}.forecast-head{border-bottom:1px solid rgba(255,255,255,.20)!important;padding-bottom:12px!important}.forecast-title{color:rgba(255,255,255,.94)!important;font-size:15px!important;letter-spacing:.12em!important;font-weight:850!important}.forecast-sub{color:rgba(255,255,255,.82)!important;font-size:13px!important}.forecast-grid{display:grid!important;grid-template-columns:repeat(2,minmax(0,1fr))!important;gap:12px!important}.forecast-item{min-height:126px!important;border-radius:22px!important;background:rgba(255,255,255,.82)!important;border:1px solid rgba(255,255,255,.52)!important;box-shadow:0 8px 20px rgba(42,76,110,.12)!important;padding:14px 12px!important}.forecast-icon{display:none!important}.forecast-hour{font-size:15px!important;color:#24445d!important;font-weight:850!important}.forecast-temp{font-size:28px!important;color:#24445d!important;font-weight:850!important;margin-top:16px!important}.forecast-meta{font-size:13px!important;line-height:1.38!important;color:#526b7d!important;font-weight:800!important;opacity:1!important}.weather-art{filter:drop-shadow(0 5px 12px rgba(30,52,78,.20))!important}.weather-art .sun-core{background:radial-gradient(circle at 35% 35%,#fff7b8 0%,#ffd84d 45%,#f5aa18 100%)!important;box-shadow:0 0 26px rgba(255,188,38,.65)!important}.weather-art .cloud::before,.weather-art .cloud::after,.weather-art .cloud span{background:linear-gradient(180deg,#fff 0%,#e7f0f9 100%)!important;border:1px solid rgba(106,132,160,.22)!important;box-shadow:0 5px 12px rgba(42,64,92,.18)!important}@media(max-width:640px){.weather-card{border-radius:30px!important;padding:28px 22px 24px!important;min-height:420px!important}.weather-inner{grid-template-columns:96px 1fr!important;gap:16px!important}.weather-icon-big{width:90px!important;height:90px!important;min-width:90px!important;min-height:90px!important;border-radius:26px!important}.weather-temp{font-size:54px!important}.weather-desc{font-size:21px!important}.weather-details{grid-template-columns:repeat(2,minmax(0,1fr))!important}.forecast-grid{grid-template-columns:repeat(2,minmax(0,1fr))!important}.forecast-item{min-height:118px!important}.forecast-temp{font-size:26px!important}}</style>`;
    html=html.replace('</head>',modalCss+weatherCss+'</head>');
    html=html.replace(/\bXII\.\s*/g,'12. ').replace(/\bXI\.\s*/g,'11. ').replace(/\bX\.\s*/g,'10. ').replace(/\bIX\.\s*/g,'09. ').replace(/\bVIII\.\s*/g,'08. ').replace(/\bVII\.\s*/g,'07. ').replace(/\bVI\.\s*/g,'06. ').replace(/\bV\.\s*/g,'05. ').replace(/\bIV\.\s*/g,'04. ').replace(/\bIII\.\s*/g,'03. ').replace(/\bII\.\s*/g,'02. ').replace(/\bI\.\s*/g,'01. ');
    document.open();document.write(html);document.close();
  }catch(err){console.error(err);document.body.innerHTML='<div class="box"><div class="t">Betöltési hiba</div><div class="s">Nem sikerült betölteni az alkalmazást.</div></div>'}
})();
</script>
