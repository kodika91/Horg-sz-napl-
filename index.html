<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>KapásPont</title>
<style>body{margin:0;background:#1a1a2e;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:system-ui,sans-serif;color:#eee}.loader{text-align:center;padding:2rem}.loader h2{font-size:1.1rem;opacity:.7;margin-top:.5rem}</style>
</head>
<body>
<div class="loader"><div style="font-size:2.5rem">🎣</div><h2>v62 · SpotFinder fotó backup + fájlból visszatöltés</h2></div>
<script>
const BASE='https://rawgit.com/kodika91/Horg-sz-napl-/22233b8cceeb27c5e38649b5b50ece08bbb2b063/app.html';
fetch(BASE).then(r=>r.text()).then(html=>{
  html=html.replace('</head>','<meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"></head>');
  document.open();document.write(html);document.close();
  function addScript(id,src){
    if(document.getElementById(id))return;
    const s=document.createElement('script');
    s.id=id;s.src=src;document.head.appendChild(s);
  }
  setTimeout(()=>{
    addScript('v18-image-manager-script','assets/v1-image-manager-v18.js?v=20260522-18e');
    addScript('kp-v27-original','https://raw.githubusercontent.com/kodika91/Horg-sz-napl-/94e999c02fdeb1834c317e434fe2dd5083d78080/assets/kp-v27-durable-image-archive.js');
    addScript('kp-mod-sync','assets/kp-mod-sync.js?v=20260522-2');
    addScript('kp-mod-weather','assets/kp-mod-weather.js?v=20260522-1');
    addScript('kp-mod-fish','assets/kp-mod-fish.js?v=20260522-2');
    addScript('kp-mod-ui','assets/kp-mod-ui.js?v=20260522-1');
    addScript('kp-mod-session','assets/kp-mod-session.js?v=20260522-2');
    addScript('kp-mod-spotfinder','assets/kp-mod-spotfinder.js?v=20260522-4');
  },300);
}).catch(e=>document.body.innerHTML='<div style="padding:2rem;color:#f66">Betöltési hiba: '+e.message+'</div>');
</script>
</body>
</html>
