<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horgász Napló</title>
<style>
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:#f4f0e8;color:#2a2018;min-height:100vh;display:flex;align-items:center;justify-content:center}.box{max-width:520px;background:#faf8f4;border:1px solid rgba(120,100,70,.18);border-radius:18px;padding:24px;box-shadow:0 10px 35px rgba(60,40,10,.12)}.t{font-weight:800;font-size:18px;margin-bottom:8px}.s{color:#6b5840;line-height:1.5;font-size:14px}
</style>
</head>
<body>
<div class="box"><div class="t">Horgász Napló betöltése…</div><div class="s">Az alkalmazás betöltése folyamatban…</div></div>
<script>
(function(){
  var appUrl='https://raw.githubusercontent.com/kodika91/Horg-sz-napl-/main/assets/app.html';
  fetch(appUrl,{cache:'no-store'})
    .then(function(r){ if(!r.ok) throw new Error('App fetch failed: '+r.status); return r.text(); })
    .then(function(html){
      var inject='';
      if(html.indexOf('fish-patch.js')===-1)
        inject+='<script src="https://raw.githubusercontent.com/kodika91/Horg-sz-napl-/main/assets/fish-patch.js"><\/script>';
      if(html.indexOf('insights.js')===-1)
        inject+='<script src="https://raw.githubusercontent.com/kodika91/Horg-sz-napl-/main/assets/insights.js"><\/script>';
      if(inject){
        html=html.indexOf('<\/body>')>-1
          ? html.replace('<\/body>',inject+'<\/body>')
          : html+inject;
      }
      document.open();
      document.write(html);
      document.close();
    })
    .catch(function(err){
      console.error(err);
      document.body.innerHTML='<div class="box"><div class="t">Betöltési hiba</div><div class="s">Nem sikerült betölteni az alkalmazást.</div></div>';
    });
})();
</script>
</body>
</html>
